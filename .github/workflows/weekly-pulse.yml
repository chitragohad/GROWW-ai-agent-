name: Weekly Pulse

on:
  schedule:
    # Monday 09:00 IST (03:30 UTC)
    - cron: "30 3 * * 1"
  workflow_dispatch:
    inputs:
      iso_week:
        description: "Optional ISO week override (e.g. 2026-W24)"
        required: false
        type: string

jobs:
  weekly-pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pulse
        run: pip install -e .

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: |
            data/ledger
            data/cache
          key: pulse-data-${{ github.repository }}-${{ github.run_id }}
          restore-keys: |
            pulse-data-${{ github.repository }}-

      - name: Run weekly pulse
        env:
          PULSE_ENV: production
          PULSE_PRODUCTION_CONFIRM: "1"
          PULSE_EMAIL_MODE: send
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MCP_SERVER_URL: ${{ secrets.MCP_SERVER_URL }}
          MCP_APPROVAL_KEY: ${{ secrets.MCP_APPROVAL_KEY }}
          GOOGLE_DOC_ID: ${{ secrets.GOOGLE_DOC_ID }}
          PULSE_EMAIL_RECIPIENTS: ${{ secrets.PULSE_EMAIL_RECIPIENTS }}
          PULSE_ALERT_WEBHOOK_URL: ${{ secrets.PULSE_ALERT_WEBHOOK_URL }}
        run: |
          ARGS=(run --product groww --confirm-production-send)
          if [ -n "${{ inputs.iso_week }}" ]; then
            ARGS+=(--iso-week "${{ inputs.iso_week }}")
          fi
          pulse "${ARGS[@]}"

      - name: Check for recent failures
        if: always()
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: pulse check-failures --product groww --since-days 7 || true

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pulse-data-${{ github.run_id }}
          path: data/
          retention-days: 30

      - name: Save data cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/ledger
            data/cache
          key: pulse-data-${{ github.repository }}-${{ github.run_id }}
